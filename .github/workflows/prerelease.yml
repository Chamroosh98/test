name: 🧪 DayPass Beta

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🛠️ Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 🛡️ Run ShellCheck on Installer Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './installer'
          severity: warning

      - name: 📁 Prepare Workspace Directories
        run: |
          mkdir -p merged-beta
          mkdir -p merged-output
          mkdir -p release-assets

      - name: 🦫 Run Go Engine
        env:
          INPUT_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          INPUT_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_VERSION: ${{ env.VERSION }}
          INPUT_BUILD_NUMBER: ${{ github.run_number }}
          INPUT_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DAYPASS_ARCH_FILE: ${{ github.workspace }}/config/architectures.json
          DAYPASS_OUTPUT_DIR: ${{ github.workspace }}/merged-output
        run: |
          cd .github/actions/engine/
          go run main.go types.go provider.go template.go

      - name: 🌐 Deploy Dynamic Beta Installer to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release-assets        
          branch: gh-pages           
          target-folder: dev         
          single-commit: true

      - name: 🧪 Create and Upload Pre-Release Packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
          name: 🧪 DayPass v${{ env.VERSION }} (Beta)
          prerelease: true
          body: |
            ## 🧪 DayPass Beta Release
            ⚠️ Experimental build via Go Engine!
            📅 Date  : `${{ env.VERSION }}`
            🧪 Build : `${{ github.run_number }}`
          files: |
            merged-beta/*.zip
            release-assets/*.sha256
            release-assets/manifest.json
            release-assets/install.sh 

      - name: 🧹 Cleanup old beta releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}