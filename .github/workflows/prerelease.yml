name: 🧪 DayPass Beta

on:
  push:
    branches:
      - beta
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [
          "aarch64_cortex-a53", "aarch64_cortex-a72", "aarch64_cortex-a76",
          "aarch64_generic", "arm_cortex-a7_neon-vfpv4", "arm_cortex-a9_vfpv3-d16",
          "i386_pentium4", "mipsel_24kc", "x86_64"
        ]
      fail-fast: false
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version for Filenames
        run: echo "VERSION=v$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🦫 Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: 🗓️ Restore / Save DayPass Downloads Cache
        uses: actions/cache@v4
        with:
          path: .cache/downloads/${{ matrix.arch }}
          key: daypass-cache-${{ matrix.arch }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-cache-${{ matrix.arch }}-

      - name: 📥 Download Packages & Create Zip via Go Fetcher
        run: |
          go run .github/actions/fetch.go ${{ matrix.arch }} ${{ env.VERSION }} beta

      - name: 📤 Upload Zip Artifact (For GitHub Releases)
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ matrix.arch }}
          path: DayPass_${{ matrix.arch }}_*_beta.zip
          retention-days: 1

      - name: 📤 Upload Raw Packages Artifact (For CDN 'packages' Branch)
        uses: actions/upload-artifact@v4
        with:
          name: raw-beta-${{ matrix.arch }}
          path: matrix-download/${{ matrix.arch }}
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version
        run: echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🦫 Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: 🛠️ Install Core Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq coreutils findutils zip unzip

      - name: 📁 Prepare Workspace Tree
        run: |
          mkdir -p merged-beta
          mkdir -p manifest-workspace
          mkdir -p build-artifacts
          mkdir -p packages-branch-content

      - name: 📥 Download All Zip Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: beta-*
          path: merged-beta/
          merge-multiple: true

      - name: 📥 Download All Raw Packages Artifacts (For CDN)
        uses: actions/download-artifact@v4
        with:
          pattern: raw-beta-*
          path: packages-branch-content/
          merge-multiple: false

      - name: 📂 Restructure Architecture Folders for CDN
        run: |
          cd packages-branch-content
          for dir in raw-beta-*; do
            if [ -d "$dir" ]; then
              arch_name="${dir#raw-beta-}"
              mv "$dir" "$arch_name"
              echo "✅ Restructured : 📂 $dir -> ⛏️ $arch_name"
            fi
          done

      - name: 🦫 Run Go Engine (Merger & Manifest Compiler)
        env:
          INPUT_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          INPUT_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_VERSION: ${{ env.VERSION }}
          INPUT_BUILD_NUMBER: ${{ github.run_number }}
          INPUT_ACTOR: ${{ github.actor }}
          INPUT_RELEASE_TYPE: "beta"
          GITHUB_REPOSITORY: ${{ github.repository }}
          DAYPASS_ARCH_FILE: ${{ github.workspace }}/config/architectures.json
          DAYPASS_OUTPUT_DIR: ${{ github.workspace }}/build-artifacts
        run: |
          cd .github/actions/engine/
          go run .

      - name: 🕵️‍♀️ Prepare GitHub Pages Assets
        run: |
          mkdir -p github-pages-content
          cp build-artifacts/install.sh github-pages-content/
          cp build-artifacts/manifest.json github-pages-content/
          echo "✅ Isolated install.sh and manifest.json for Pages deployment!"

      - name: 🌐 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: github-pages-content  
          target-folder: beta             
          branch: gh-pages

      - name: 🔍 Debug & Verify Raw Packages Tree Structure
        run: |
          echo "📂 Checking packages-branch-content directory:"
          ls -la packages-branch-content/
          find packages-branch-content/ -maxdepth 2 -type d
          
      - name: 🚀 Deploy Binary Packages to 'packages' Branch (Overwriting)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages-branch-content
          branch: packages
          single-commit: true

      - name: 🧹 Purge jsDelivr Cache for Manifest & Packages
        run: |
          echo "🌐 Purging jsDelivr CDN cache ..."
          curl -s "https://purge.jsdelivr.net/gh/Chamroosh98/DayPass@gh-pages/beta/manifest.json"
          curl -s "https://purge.jsdelivr.net/gh/Chamroosh98/DayPass@gh-pages/beta/install.sh"
          echo "✅ CDN cache purged successfully!"

      - name: 📊 Verify Release Assets Size & Guardrail
        run: |
          echo "📁 Listing all files in build-artifacts with their sizes :"
          ls -lh build-artifacts/
          echo "--------------------------------------------------------"
          echo "🚨 Checking for zero-byte files ..."
          if find build-artifacts/ -type f -empty | grep -q .; then
            echo "❌ Error : Zero-byte files detected in build-artifacts!"
            find build-artifacts/ -type f -empty
            exit 1
          fi
          echo "✅ All release assets have valid file sizes and are ready for upload!"

      - name: 🧪 Create and Upload Pre-Release Packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
          name: 🧪 v${{ env.VERSION }}
          prerelease: true
          body: |
            ## 🧪 DayPass Beta Release
            📅 Date  : `${{ env.VERSION }}`
            🧪 Build : `${{ github.run_number }}`
          files: |
            build-artifacts/*.zip
            build-artifacts/*.sha256

      - name: 🧹 Cleanup old beta releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}