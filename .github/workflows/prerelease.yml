name: 🧪 DayPass Pre-Release

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prep-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 📤 Generate Matrix Config
        id: set-matrix
        run: |
          ARCH_ARRAY=$(jq -c '.architectures | [.[].name]' config/architectures.json)
          echo "matrix={\"arch\":${ARCH_ARRAY}}" >> $GITHUB_OUTPUT

  build:
    needs: prep-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prep-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🗓️ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: cache
          key: daypass-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-${{ matrix.arch }}-

      - name: 🛡️ Run ShellCheck on Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './core'
          severity: warning

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl jq coreutils findutils zip

      - name: 📝 Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: 👷‍♀️ Build DayPass for ${{ matrix.arch }}
        shell: bash
        run: |
          ./core/orchestrator.sh "${{ matrix.arch }}"

      - name: 🧪 Validate Build
        shell: bash
        run: |
          echo "📁 Checking output root directory :"
          ls -la output/
          
          if [ -f "output/install.sh" ] || [ -f "output/${{ matrix.arch }}/install.sh" ]; then
            echo "✅ install.sh validation passed!"
          else
            echo "❌ install.sh not found!"
            exit 1
          fi

      - name: 📦 Create DayPass Beta Package
        shell: bash
        run: |
          ZIP_NAME="DayPass_${{ matrix.arch }}_v${{ env.VERSION }}-beta.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd "output/${{ matrix.arch }}"
          zip -r "../../$ZIP_NAME" passwall_luci passwall2 passwall_packages -x "*/index.json"
          
          cd ../..
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

      - name: 📤 Upload Beta Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ matrix.arch }}
          path: |
            DayPass_${{ matrix.arch }}_*.zip
            DayPass_${{ matrix.arch }}_*.sha256
            output/install.sh
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version (For Tagging)
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 📁 Prepare Workspace Directories
        run: |
          mkdir -p merged-beta
          mkdir -p merged-output

      - name: 📥 Download All Beta Artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-beta/
          pattern: beta-*
          merge-multiple: true

      - name: 🦫 Run Go Engine
        uses: ./.github/actions
        with:
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          version: ${{ env.VERSION }}
          build_number: ${{ github.run_number }}
          actor: ${{ github.actor }}

      - name: 🌐 Deploy Dynamic Beta Installer to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release-assets        
          branch: gh-pages           
          target-folder: dev         
          single-commit: true
          # clean-exclude: |
          #   *.zip
          #   *.sha256

      - name: 👩‍🏭 Creating new GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
          files: |
            merged-beta/*.zip
            merged-beta/*.sha256
            merged-output/final_manifest.json

      - name: 🧪 Upload Pre-Release packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
          name: 🧪 DayPass v${{ env.VERSION }}
          prerelease: true
          body: |
            ## 🧪 DayPass Beta Release
            ⚠️ Experimental build!
            📅 Date  : `${{ env.VERSION }}`
            🧪 Build : `${{ github.run_number }}`
          files: |
            release-assets/DayPass_*.zip
            release-assets/DayPass_*.sha256
            release-assets/manifest.json

      - name: 🧹 Cleanup old beta releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      