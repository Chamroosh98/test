name: 🧪 DayPass Pre-Release

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:

  prep-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 📤 Generate Matrix Config
        id: set-matrix
        run: |
          ARCH_ARRAY=$(jq -c '.architectures | [.[].name]' config/architectures.json)
          echo "matrix={\"arch\":${ARCH_ARRAY}}" >> $GITHUB_OUTPUT

  build:
    needs: prep-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prep-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🗓️ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: cache
          key: daypass-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-${{ matrix.arch }}-

      - name: 🛡️ Run ShellCheck on Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './core'
          additional_files: './core/bootstrap.sh'
          severity: warning

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl jq coreutils findutils zip

      - name: 📝 Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: 👷‍♀️ Build DayPass for ${{ matrix.arch }}
        shell: bash
        run: |
          ./core/orchestrator.sh "${{ matrix.arch }}"

      - name: 🧪 Validate Build
        shell: bash
        run: |
          test -f output/install.sh
          test -f output/manifest.json

      - name: 📦 Create DayPass Beta Package
        shell: bash
        run: |
          ZIP_NAME="DayPass_${{ matrix.arch }}_v${VERSION}-beta.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd "output/${{ matrix.arch }}"
          zip -r "../../$ZIP_NAME" passwall_luci passwall2 passwall_packages -x "*/index.json"
          cd ../..
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-package-${{ matrix.arch }}
          path: |
            DayPass_*.zip
            DayPass_*.sha256
            output/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Beta Version (For Tagging)
        run: |
          echo "VERSION=$(date +%y.%m.%
      - name: 📁 Prepare Temp Directory
        run: mkdir -p merged-beta

      - name: 📥 Download All Beta Artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-beta/
          pattern: beta-package-*
          merge-multiple: true

      - name: 🚀 Upload Pre-Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
          name: 🧪 DayPass v${{ env.VERSION }} Beta
          prerelease: true
          body: |
            ## 🧪 DayPass Beta Release
            ⚠️ Experimental build!
            📅 Date : `${{ env.VERSION }}`
            🧪 Build : `${{ github.run_number }}`
          files: |
            merged-beta/DayPass_*.zip
            merged-beta/DayPass_*.sha256

      - name: 📢 Send Telegram Notification (Beta)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🧪 *The new DayPass beta is ready!*
            ───────────────────
            🏷️ *Version :* `v${{ env.VERSION }}-beta`
            🛠️ *Build Number :* `${{ github.run_number }}`
            📅 *Publish Date :* `${{ env.VERSION }}`
            👤 *Author :* `${{ github.actor }}`
            ───────────────────
            🔗 *Direct Link From Github :*
            https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }}-beta-${{ github.run_number }}