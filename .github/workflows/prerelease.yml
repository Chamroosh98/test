
name: рџ§Є DayPass Pre-Release

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prep-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: рџ”Ћ Checkout Repository
        uses: actions/checkout@v4

      - name: рџ“¤ Generate Matrix Config
        id: set-matrix
        run: |
          ARCH_ARRAY=$(jq -c '.architectures | [.[].name]' config/architectures.json)
          echo "matrix={\"arch\":${ARCH_ARRAY}}" >> $GITHUB_OUTPUT

  build:
    needs: prep-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prep-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: рџ”Ћ Checkout Repository
        uses: actions/checkout@v4

      - name: рџЏ·пёЏ Generate Beta Version
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: рџ—“пёЏ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: cache
          key: daypass-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-${{ matrix.arch }}-

      - name: рџ›ЎпёЏ Run ShellCheck on Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './core'
          additional_files: './core/bootstrap.sh'
          severity: warning

      - name: рџ› пёЏ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl jq coreutils findutils zip

      - name: рџ“ќ Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: рџ‘·вЂЌв™ЂпёЏ Build DayPass for ${{ matrix.arch }}
        shell: bash
        run: |
          ./core/orchestrator.sh "${{ matrix.arch }}"

      - name: рџ§Є Validate Build
        shell: bash
        run: |
          echo "рџ“Ѓ Checking output root directory:"
          ls -la output/
          
          if [ -f "output/install.sh" ] || [ -f "output/${{ matrix.arch }}/install.sh" ]; then
            echo "вњ… install.sh validation passed!"
          else
            echo "вќЊ install.sh not found!"
            exit 1
          fi

      - name: рџ“¦ Create DayPass Beta Package
        shell: bash
        run: |
          ZIP_NAME="DayPass_${{ matrix.arch }}_v${{ env.VERSION }}-beta.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd "output/${{ matrix.arch }}"
          
          zip -r "../../$ZIP_NAME" passwall_luci passwall2 passwall_packages -x "*/index.json" -x "install.sh"
          
          cd ../..
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

      - name: рџ“¤ Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-package-${{ matrix.arch }}
          path: |
            DayPass_${{ matrix.arch }}_*.zip
            DayPass_${{ matrix.arch }}_*.sha256
            output/${{ matrix.arch }}/passwall_luci/
            output/${{ matrix.arch }}/passwall2/
            output/${{ matrix.arch }}/passwall_packages/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: рџ”Ћ Checkout Repository
        uses: actions/checkout@v4

      - name: рџЏ·пёЏ Generate Beta Version (For Tagging)
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: рџ› пёЏ Install Dependencies for Deploy
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl coreutils zip

      - name: рџ“ќ Make Repo Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: рџ“Ѓ Prepare Workspace Directories
        run: |
          mkdir -p merged-beta
          mkdir -p merged-output

      - name: рџ“Ґ Download All Beta Artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-beta/
          pattern: beta-package-*
          merge-multiple: true

      - name: рџ¤ќ Organize and Merge Architecture Outputs
        shell: bash
        run: |
          ARCHS=$(jq -r '.architectures[].name' config/architectures.json)
          for arch in $ARCHS; do
            mkdir -p "merged-output/$arch"
            if [ -d "merged-beta/passwall_luci" ]; then
              cp -r merged-beta/passwall_luci "merged-output/$arch/" 2>/dev/null || true
              cp -r merged-beta/passwall2 "merged-output/$arch/" 2>/dev/null || true
              cp -r merged-beta/passwall_packages "merged-output/$arch/" 2>/dev/null || true
            fi
          done

      - name: рџ§  Generate Final Manifest
        shell: bash
        run: |
          source core/context.sh
          source metadata/manifest.sh

          export DAYPASS_OUTPUT_DIR="$PWD/merged-output"
          export DAYPASS_TEMP_DIR="$PWD/merged-output"

          find merged-output -type f ! -name "*.apk" -delete
          
          generate_manifest

      - name: рџ§· Inject Zip Metadata into Manifest
        shell: bash
        run: |
          if [ -f "merged-output/manifest.json" ]; then
            MANIFEST_PATH="merged-output/manifest.json"
          else
            MANIFEST_PATH="config/architectures.json"
          fi

          NEW_MANIFEST="merged-output/final_manifest.json"
          cp "$MANIFEST_PATH" "$NEW_MANIFEST"

          ARCHS=$(jq -r '.architectures[].name' config/architectures.json)

          for arch in $ARCHS; do
            ZIP_FILE=$(find merged-beta -maxdepth 1 -type f -name "DayPass_${arch}_*.zip" | head -n 1)

            if [ -n "$ZIP_FILE" ] && [ -f "$ZIP_FILE" ]; then
              FILE_NAME=$(basename "$ZIP_FILE")
              FILE_SIZE=$(stat -c "%s" "$ZIP_FILE")
              FILE_SHA=$(sha256sum "$ZIP_FILE" | cut -d' ' -f1)
              PKG_NAME="${FILE_NAME%.zip}"

              jq --arg arch "$arch" \
                  --arg pkg "$PKG_NAME" \
                  --arg file "$FILE_NAME" \
                  --arg sha "$FILE_SHA" \
                  --argjson size "$FILE_SIZE" \
                  '(.architectures[] | select(.name == $arch) | .packages) |= [{package: $pkg, file: $file, sha256: $sha, size: $size}]' \
                  "$NEW_MANIFEST" > "${NEW_MANIFEST}.tmp" && mv "${NEW_MANIFEST}.tmp" "$NEW_MANIFEST"
            fi
          done

          mkdir -p release-assets
          cp merged-beta/DayPass_*.zip release-assets/ 2>/dev/null || true
          cp merged-beta/DayPass_*.sha256 release-assets/ 2>/dev/null || true
          cp "$NEW_MANIFEST" release-assets/manifest.json

      - name: рџљЂ Upload Pre-Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
          name: рџ§Є DayPass v${{ env.VERSION }} Beta
          prerelease: true
          body: |
            ## рџ§Є DayPass Beta Release
            вљ пёЏ Experimental build!
            рџ“… Date  : `${{ env.VERSION }}`
            рџ§Є Build : `${{ github.run_number }}`
          files: |
            release-assets/DayPass_*.zip
            release-assets/DayPass_*.sha256

      - name: рџ“ў Send Smart Telegram Menu (Beta)
        shell: bash
        run: |
          KEYBOARD=$(jq -c '{
            "inline_keyboard": [.architectures[] | [{
              "text": "рџ“¦ \(.name)",
              "url": "https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}-beta-${{ github.run_number }}/DayPass_\(.name)_v${{ env.VERSION }}-beta.zip"
            }]]
          }' config/architectures.json)

          MESSAGE="рџ§Є *New DayPass Beta Build Ready!*

          рџЏ·пёЏ *Version :* \`v${{ env.VERSION }}-beta\`
          рџ› пёЏ *Build Number :* \`${{ github.run_number }}\`
          рџ‘¤ *Triggered By :* \`${{ github.actor }}\`

          рџ‘‡ Please select your architecture to download directly from GitHub :"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown" \
            -d "reply_markup=$KEYBOARD" \
            -d "disable_web_page_preview=true"

      - name: рџ§№ Cleanup old beta releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
