name: рџ§Є DayPass Pre-Release

on:
  push:
    branches:
      - dev

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: рџ”Ћ Checkout Repository
        uses: actions/checkout@v4

      - name: рџЏ·пёЏ Generate Beta Version
        id: version
        shell: bash
        run: |
          VERSION=$(date +%y.%m.%d)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: рџ—“пёЏ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: |
            cache
          key: daypass-${{ runner.os }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-

      - name: рџ›ЎпёЏ Run ShellCheck on Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './core'
          additional_files: './core/bootstrap.sh'
          severity: warning

      - name: рџ› пёЏ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            curl \
            jq \
            coreutils \
            findutils \
            zip

      - name: рџ“ќ Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: рџ‘·вЂЌв™ЂпёЏ Build DayPass
        shell: bash
        run: |
          ./core/orchestrator.sh

      - name: рџ§Є Validate Build
        shell: bash
        run: |
          test -f output/install.sh
          test -f output/manifest.json

      - name: рџ“¦ Create DayPass Beta Package
        shell: bash
        run: |
          ARCH=$(find output -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | head -n1)
          ZIP_NAME="DayPass_${ARCH}_v${VERSION}-beta.zip"

          cd "output/$ARCH"
          zip -r "../../$ZIP_NAME" \
            passwall_luci \
            passwall2 \
            passwall_packages \
            -x "*/index.json"

          cd ../..
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ARCH=$ARCH" >> $GITHUB_ENV

      - name: рџ“¤ Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-package
          path: |
            DayPass_*.zip
            DayPass_*.sha256
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: рџ”Ћ Checkout Repository
        uses: actions/checkout@v4

      - name: рџЏ·пёЏ Generate Beta Version (For Tagging)
        shell: bash
        run: |
          VERSION=$(date +%y.%m.%d)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: рџ“Ґ Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: beta-package

      - name: рџљЂ Upload Pre-Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
            tag_name: v${{ env.VERSION }}-beta-${{ github.run_number }}
            name: рџ§Є DayPass v${{ env.VERSION }} Beta
            prerelease: true
            body: |
                ## рџ§Є DayPass Beta Release
                вљ пёЏ Experimental build!
                рџ“… Date : `${{ env.VERSION }}`
                рџ§Є Build : `${{ github.run_number }}`
            files: |
                DayPass_*-beta.zip
                DayPass_*-beta.zip.sha256

      - name: рџ“ў Send Telegram Notification (Beta)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            рџ§Є *The new DayPass beta is ready!*
            в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            рџЏ·пёЏ *Version:* `v${{ env.VERSION }}-beta`
            рџ› пёЏ *Build Number:* `${{ github.run_number }}`
            рџ“… * Publish Date:* `${{ env.VERSION }}`
            рџ‘¤ *Author:* `${{ github.actor }}`
            в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            рџ”— *Direct Link From Github :*
            https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }}-beta-${{ github.run_number }}