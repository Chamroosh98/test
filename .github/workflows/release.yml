name: ⚙️ DayPass Release

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Release Version
        id: version
        shell: bash
        run: |
          VERSION=$(date +%y.%m.%d)
          RELEASE_DATE=$(date +%Y-%m-%d)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_DATE=$RELEASE_DATE" >> $GITHUB_ENV

      - name: 🗓️ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: |
            cache
          key: daypass-${{ runner.os }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-

      - name: 🛡️ Run ShellCheck on Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './core'
          additional_files: './core/bootstrap.sh'
          severity: warning

      - name: 😼 Setup Pages
        uses: actions/configure-pages@v5

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            curl \
            jq \
            coreutils \
            findutils \
            zip

      - name: 📝 Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: 👷‍♀️ Build DayPass
        shell: bash
        run: |
          ./core/orchestrator.sh

      - name: 🧪 Validate Build
        shell: bash
        run: |
          test -f output/install.sh
          test -f output/manifest.json

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: 🔍 Debug Output Structure
        shell: bash
        run: |
          tree -L 3 output

      - name: 📦 Create DayPass Release Package
        shell: bash
        run: |
          ARCH=$(find output -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | head -n1)
          ZIP_NAME="DayPass-${ARCH}-v${VERSION}.zip"

          echo "✅ ARCH    : $ARCH"
          echo "✅ VERSION : $VERSION"
          echo "✅ ZIP     : $ZIP_NAME"

          cd "output/$ARCH"
          zip -r "../../$ZIP_NAME" \
            passwall_luci \
            passwall2 \
            passwall_packages \
            -x "*/index.json"

          cd ../..
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ARCH=$ARCH" >> $GITHUB_ENV

          echo "✅ Release package created!"
          ls -lh "$ZIP_NAME"
      
      - name: 🚀 Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: |
            DayPass v${{ env.VERSION }}
          body: |
            🚀 **DayPass Release**
            ─────────────────────
            📅 Release Date : `${{ env.RELEASE_DATE }}`
            📦 Included Packages :
              - passwall2    
              - passwall_luci
              - passwall_packages  
            ─────────────────────
            🔗 Full documentation :
                  https://github.com/${{ github.repository }}
          prerelease: false
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📢 Send Telegram Notification (Official)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *The official version of DayPass has been released!*
            ───────────────────
            🏷️ *Version :* `v${{ env.VERSION }}`
            📅 *Release Date :* `${{ env.RELEASE_DATE }}`
            📦 *Included Packages :*
              • passwall2
              • passwall_luci
              • passwall_packages
            ───────────────────
            🌐 *Direct installation link :*
            `https://chamroosh98.github.io/DayPass/`
            
            🔗 *Release page and ZIP files:*
            https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }}