name: ⚙️ DayPass Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  prep-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 📤 Generate Matrix Config
        id: set-matrix
        run: |
          ARCH_ARRAY=$(jq -c '.architectures | [.[].name]' config/architectures.json)
          echo "matrix={\"arch\":${ARCH_ARRAY}}" >> $GITHUB_OUTPUT

  build:
    needs: prep-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prep-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Release Version
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🗓️ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: cache
          key: daypass-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-${{ matrix.arch }}-

      - name: 🛡️ Run ShellCheck on Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './core'
          severity: warning

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl jq coreutils findutils zip

      - name: 📝 Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: 👷‍♀️ Build DayPass for ${{ matrix.arch }}
        shell: bash
        run: |
          ./core/orchestrator.sh "${{ matrix.arch }}"

      - name: 🧪 Validate Build
        shell: bash
        run: |
          if [ -f "output/install.sh" ] || [ -f "output/${{ matrix.arch }}/install.sh" ]; then
            echo "✅ install.sh validation passed!"
          else
            echo "❌ install.sh not found!"
            exit 1
          fi

      - name: 📦 Create DayPass Release Package
        shell: bash
        run: |
          ZIP_NAME="DayPass_${{ matrix.arch }}_v${{ env.VERSION }}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd "output/${{ matrix.arch }}"
          zip -r "../../$ZIP_NAME" passwall_luci passwall2 passwall_packages -x "*/index.json" -x "install.sh"
          cd ../..
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ matrix.arch }}
          path: |
            DayPass_${{ matrix.arch }}_v*.zip
            DayPass_${{ matrix.arch }}_v*.sha256
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🔎 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Version Variables for Deploy
        run: |
          echo "VERSION=$(date +%y.%m.%d)" >> $GITHUB_ENV

      - name: 🛠️ Install Dependencies for Deploy
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl coreutils zip unzip

      - name: 📁 Prepare Workspace Directories
        run: |
          mkdir -p merged-artifacts
          mkdir -p merged-output
          mkdir -p release-assets

      - name: 📥 Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-artifacts/
          pattern: release-package-*
          merge-multiple: true

      - name: 🤝 Organize and Merge Architecture Outputs for Pages
        shell: bash
        run: |
          ARCHS=$(jq -r '.architectures[].name' config/architectures.json)
          for arch in $ARCHS; do
            mkdir -p "merged-output/$arch"
            ZIP_FILE=$(find merged-artifacts -maxdepth 1 -type f -name "DayPass_${arch}_v*.zip" | head -n 1)
            if [ -n "$ZIP_FILE" ] && [ -f "$ZIP_FILE" ]; then
              unzip -q "$ZIP_FILE" -d "merged-output/$arch/"
            fi
          done
    
      - name: 🧠 Generate Final Manifest
        shell: bash
        run: |
          source core/context.sh
          source metadata/manifest.sh

          export DAYPASS_OUTPUT_DIR="$PWD/merged-output"
          export DAYPASS_TEMP_DIR="$PWD/merged-output"

          find merged-output -type f ! -name "*.apk" -delete
          
          generate_manifest

      - name: 🧷 Inject Zip Metadata into Manifest
        shell: bash
        run: |
          if [ -f "merged-output/manifest.json" ]; then
            MANIFEST_PATH="merged-output/manifest.json"
          else
            MANIFEST_PATH="config/architectures.json"
          fi

          NEW_MANIFEST="merged-output/final_manifest.json"
          cp "$MANIFEST_PATH" "$NEW_MANIFEST"

          ARCHS=$(jq -r '.architectures[].name' config/architectures.json)

          for arch in $ARCHS; do
            ZIP_FILE=$(find merged-artifacts -maxdepth 1 -type f -name "DayPass_${arch}_v*.zip" | head -n 1)

            if [ -n "$ZIP_FILE" ] && [ -f "$ZIP_FILE" ]; then
              FILE_NAME=$(basename "$ZIP_FILE")
              FILE_SIZE=$(stat -c "%s" "$ZIP_FILE")
              FILE_SHA=$(sha256sum "$ZIP_FILE" | cut -d' ' -f1)
              PKG_NAME="${FILE_NAME%.zip}"

              jq --arg arch "$arch" \
                  --arg pkg "$PKG_NAME" \
                  --arg file "$FILE_NAME" \
                  --arg sha "$FILE_SHA" \
                  --argjson size "$FILE_SIZE" \
                  '(.architectures[] | select(.name == $arch) | .packages) |= [{package: $pkg, file: $file, sha256: $sha, size: $size}]' \
                  "$NEW_MANIFEST" > "${NEW_MANIFEST}.tmp" && mv "${NEW_MANIFEST}.tmp" "$NEW_MANIFEST"
            fi
          done

          cp "$NEW_MANIFEST" merged-output/manifest.json


      - name: 😼 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged-output

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📦 Prepare Release Assets
        run: |
          cp merged-artifacts/DayPass_*.zip release-assets/
          cp merged-artifacts/DayPass_*.sha256 release-assets/

      - name: 🚀 Upload Official Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: ⚙️ DayPass v${{ env.VERSION }} Official Stable
          prerelease: false
          body: |
            ## ⚙️ DayPass Official Stable Release
            🎯 Stable and ready for production!
            📅 Date : `${{ env.VERSION }}`
          files: |
            release-assets/DayPass_*.zip
            release-assets/DayPass_*.sha256

      - name: 📢 Send Smart Telegram Menu (Official)
        shell: bash
        run: |
          RELEASE_TAG="v${{ env.VERSION }}"
          
          KEYBOARD=$(jq -c --arg tag "$RELEASE_TAG" --arg repo "${{ github.repository }}" --arg ver "${{ env.VERSION }}" '{
            "inline_keyboard": [.architectures[] | [{
              "text": "🚀 \(.name)",
              "url": "https://github.com/\($repo)/releases/download/\($tag)/DayPass_\(.name)_v\($ver).zip"
            }]]
          }' config/architectures.json)

          MESSAGE="🚀 *Official DayPass Release is Out!*

          🏷️ *Version :* \`v${{ env.VERSION }}\`
          👤 *Released By :* \`${{ github.actor }}\`

          👇 Click below to get the official stable package for your router :"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown" \
            -d "reply_markup=$KEYBOARD" \
            -d "disable_web_page_preview=true"