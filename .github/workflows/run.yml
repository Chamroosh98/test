name: 🗿 DayPass Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Restore Cache
      - name: 🗓️ Restore DayPass Cache
        uses: actions/cache@v4
        with:
          path: |
            cache
          key: daypass-${{ runner.os }}-${{ hashFiles('config/architectures.json') }}
          restore-keys: |
            daypass-${{ runner.os }}-

      # GitHub Pages
      - name: 😼 Setup Pages
        uses: actions/configure-pages@v5

      # Install Tools
      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            curl \
            jq \
            coreutils \
            findutils \
            zip

      # chmod
      - name: 📝 Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      # Build
      - name: 👷‍♀️ Build DayPass
        shell: bash
        run: |
          ./core/orchestrator.sh

      # Validate
      - name: 🧪 Validate Build
        shell: bash
        run: |
          test -f output/install.sh
          test -f output/manifest.json

      # Upload Pages
      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: 🔍 Debug Output Structure
        shell: bash
        run: |
          tree -L 3 output

      # Package Release ZIP
      - name: 📦 Create DayPass Release Package
        shell: bash
        run: |
          ARCH=$(find output -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | head -n1)

          VERSION=$(find "output/$ARCH/passwall2" \
            -name "luci-app-passwall2-*.apk" \
            | sed -n 's/.*luci-app-passwall2-\([0-9.]*\)-r.*/\1/p' \
            | head -n1)

          ZIP_NAME="DayPass-${ARCH}-v${VERSION}.zip"

          echo "✅ ARCH    : $ARCH"
          echo "✅ VERSION : $VERSION"
          echo "✅ ZIP     : $ZIP_NAME"

          cd "output/$ARCH"

          zip -r "../../$ZIP_NAME" \
            passwall_luci \
            passwall2 \
            passwall_packages \
            -x "*/index.json"

          cd ../..

          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

          echo "✅ Release package created!"
          ls -lh "$ZIP_NAME"
      
      - name: 🚀 Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: DayPass Release ${{ github.run_number }}
          files: |
            DayPass_*.zip
            DayPass_*.sha256

  deploy:

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # Deploy Pages
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        