name: DayPass Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            bash \
            curl \
            jq \
            coreutils \
            findutils

      - name: Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: Build DayPass
        shell: bash
        run: |
          ./core/orchestrator.sh

      - name: Validate Build
        shell: bash
        run: |

          test -f output/install.sh

          test -f output/manifest.json

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4